<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>주마등 : 시네마</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grain"></div>

<div class="container">
  <h1>주마등 : 시네마</h1>
  <p class="subtitle">스쳐가는 8초 인생 장면 생성기</p>

  <!-- 1. 오늘의 일기 -->
  <div class="step">
    <h2>1. 오늘의 일기</h2>
    <textarea id="diary" placeholder="오늘의 장면을 적어주세요..."></textarea>
  </div>

  <!-- 2. 영상 스타일 -->
  <div class="step">
    <h2>2. 영상 스타일</h2>
    <select id="videoStyle">
      <option>흑백 시네마틱</option>
      <option>몽환적 안개</option>
      <option>느린 카메라 워킹</option>
    </select>
  </div>

  <!-- 3. 캐릭터 스타일 -->
  <div class="step">
    <h2>3. 캐릭터 스타일</h2>
    <select id="characterStyle">
      <option value="Pixar 3D Animation">Pixar 3D Animation</option>
      <option value="Studio Ghibli Style">Studio Ghibli Style</option>
      <option value="Realistic Cinematic Film">Realistic Cinematic Film</option>
      <option value="Noir Black & White">Noir Black & White</option>
      <option value="Makoto Shinkai Anime">Makoto Shinkai Anime</option>
      <option value="Hyperrealistic 4K">Hyperrealistic 4K</option>
      <option value="Claymation">Claymation</option>
      <option value="Vintage 90s Film">Vintage 90s Film</option>
      <option value="custom">직접 입력</option>
    </select>
    <input id="customStyle" placeholder="스타일 직접 입력" style="display:none;" />
  </div>

  <!-- 4. 캐릭터 특징 -->
  <div class="step">
    <h2>4. 캐릭터 특징</h2>
    <input id="characterDesc" placeholder="예: 30대 남자, 지친 표정, 검은 코트">
  </div>

  <!-- 생성 버튼 -->
  <button id="generateBtn">씬 분할 + 프롬프트 생성</button>

  <!-- 출력 영역 -->
  <div class="output-section">
    <textarea id="output" placeholder="여기에 씬 분할 프롬프트가 생성됩니다..."></textarea>
    <button id="copyBtn">복사하기</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
