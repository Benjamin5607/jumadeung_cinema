<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주마등 : 시네마 v16 (Wisk/Flow 최적화)</title>
  <link rel="icon" type="image/png" href="assets/reaper.png">
  <link rel="stylesheet" href="style.css">
  <link rel="apple-touch-icon" href="assets/reaper.png">

  <link rel="icon" sizes="192x192" href="assets/reaper.png">
  <link rel="icon" sizes="512x512" href="assets/reaper.png">

  <meta name="theme-color" content="#000000">
</head>
<body>

  <div class="grain"></div>
  <div class="floating-lights">
    <svg class="light" viewBox="0 0 4 10"><ellipse cx="2" cy="5" rx="2" ry="5" fill="orange" opacity="0.5"/></svg>
    <svg class="light" viewBox="0 0 4 10"><ellipse cx="2" cy="5" rx="2" ry="5" fill="orange" opacity="0.5"/></svg>
    <svg class="light" viewBox="0 0 4 10"><ellipse cx="2" cy="5" rx="2" ry="5" fill="orange" opacity="0.5"/></svg>
  </div>

  <div class="grim-wrapper">
    <div class="reaper-bubble" id="reaperBubble"></div>
    <img src="assets/reaper.png" alt="Grim Reaper" class="grim" id="reaperImg"/>
  </div>

  <div class="container">
    <h1 id="ui_mainTitle">주마등 : 시네마 v16</h1>
    <p id="ui_subTitle" class="subtitle">Wisk / Flow / Groq 하이브리드 워크플로우</p>

    <div class="panel">
      <label><span id="ui_langLabel">Language:</span>
        <select id="langSelect">
          <option value="ko">한국어</option>
          <option value="en">English</option>
        </select>
      </label>

      <label><span id="ui_apiLabel">AI API Key:</span>
        <input id="apiKey" placeholder="Groq (gsk_) / OpenAI (sk-) / Gemini (AIza-)">
      </label>
      <div class="api-help-wrapper">
        <a href="https://console.groq.com/keys" target="_blank" class="api-help-link" id="ui_apiHelp">
          👉 API 키 무료 발급 (Groq)
        </a>
      </div>

      <button id="loadModels">모델 리스트 불러오기</button>
      <select id="aiModel"><option value="">모델 선택</option></select>
    </div>

    <div class="panel">
      <h3 id="ui_baseTitle">📚 일기 및 스타일 설정</h3>
      <textarea id="diary" placeholder="오늘의 일기를 적어주세요..."></textarea>
      
      <div class="grid-2">
        <label><span id="ui_styleLabel">영상 스타일:</span>
          <select id="videoStyle">
            <option>Cinematic, 8k, highly detailed</option>
            <option>Dreamy, volumetric fog, soft focus</option>
            <option>Dark noir, high contrast, black and white</option>
          </select>
        </label>
        <label><span id="ui_charStyleLabel">캐릭터 비주얼:</span>
          <select id="characterStyle">
            <option value="Pixar 3D Animation style">Pixar 3D Animation</option>
            <option value="Studio Ghibli anime style">Studio Ghibli Style</option>
            <option value="Realistic Cinematic Film">Realistic Cinematic</option>
            <option value="Noir Black & White">Noir Black & White</option>
            <option value="Makoto Shinkai Anime style">Makoto Shinkai Anime</option>
            <option value="Hyperrealistic 4K">Hyperrealistic 4K</option>
            <option value="Claymation">Claymation</option>
            <option value="Vintage 90s Film">Vintage 90s Film</option>
            <option value="Cyberpunk aesthetic">Cyberpunk</option>
            <option value="custom">직접 입력 (Custom)</option>
          </select>
        </label>
      </div>
      <input id="customStyle" placeholder="스타일 직접 입력" style="display:none; margin-top: 10px;">
      <input id="characterDesc" placeholder="등장인물 특징 요약 (예: 문이-30대 남자, 나-20대 여자)">

      <button id="extractBtn" class="primary-btn">1단계 : 캐릭터 오브젝트 추출</button>
    </div>

    <div class="panel highlight-panel">
      <h3 id="ui_fixedTitle">🧬 캐릭터별 고정 프롬프트 (Wisk Object용)</h3>
      <p id="ui_fixedDesc" class="desc">캐릭터별로 따로 복사해서 위스크의 Object/Character 설정에 넣으세요.</p>
      <div id="characterPromptContainer">
        <textarea id="fixedCharacterPrompt" placeholder="1단계를 실행하면 캐릭터별 프롬프트가 여기에 생성됩니다."></textarea>
      </div>
      <button id="generateScenesBtn" class="success-btn" disabled>2단계 : 전체 씬 프롬프트 생성</button>
    </div>

    <div class="stats"><p id="sceneCount"></p></div>

    <h3 id="ui_krTitle">🎬 한글 씬 플랜</h3>
    <textarea id="outputKR" class="output-area"></textarea>

    <h3 id="ui_imgTitle">🖼️ 이미지 전용 프롬프트 (Wisk/Flow 씬 입력용)</h3>
    <p class="desc">캐릭터 외모 묘사가 제외된 배경+액션 위주 프롬프트입니다.</p>
    <textarea id="outputImageEN" class="output-area"></textarea>

    <h3 id="ui_enTitle">🎥 최종 영상 프롬프트 (Groq/Luma/Runway용)</h3>
    <p class="desc">캐릭터와 액션이 모두 포함된 풀 버전입니다.</p>
    <textarea id="outputEN" class="output-area"></textarea>
    <button id="copyEN">영상 프롬프트 전체 복사</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
