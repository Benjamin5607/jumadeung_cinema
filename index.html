<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주마등 시네마틱</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 필름 그레인 -->
  <div class="grain"></div>

  <!-- 등불 애니 -->
  <div class="floating-lights">
    <img src="assets/lights.svg" class="light"/>
    <img src="assets/lights.svg" class="light"/>
    <img src="assets/lights.svg" class="light"/>
  </div>

  <!-- 저승사자 -->
  <div class="grim-wrapper">
    <img src="assets/grim_reaper.png" alt="Grim Reaper" class="grim"/>
    <div id="grim-quote"></div>
  </div>

  <!-- UI 영역 -->
  <div class="ui-container">
    <select id="langSelect">
      <option value="ko">한국어</option>
      <option value="en">English</option>
    </select>

    <input type="text" id="apiKey" placeholder="API Key 입력"/>
    <button id="loadModels">모델 불러오기</button>
    <select id="aiModel"></select>

    <textarea id="diaryInput" placeholder="오늘 일기를 입력하세요"></textarea>
    <button id="generateScenes">씬 생성</button>
    
    <div id="sceneCounter">씬 수: 0</div>
    <textarea id="promptOutput" readonly></textarea>
  </div>

  <!-- 광고 배너 예시 -->
  <div class="ad-banner top">상단 광고</div>
  <div class="ad-banner bottom">하단 광고</div>

<script src="app.js"></script>
</body>
</html>
