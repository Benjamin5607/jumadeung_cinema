<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>주마등 : 시네마 v10</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grain"></div> <!-- 필름 그레인 -->

<!-- 상단 광고 -->
<div class="ad-slot" id="adTop">상단 광고 영역</div>

<!-- 등불 애니 -->
<div class="floating-lights">
  <svg class="light" viewBox="0 0 4 10"><ellipse cx="2" cy="5" rx="2" ry="5" fill="orange" opacity="0.5"/></svg>
  <svg class="light" viewBox="0 0 4 10"><ellipse cx="2" cy="5" rx="2" ry="5" fill="orange" opacity="0.5"/></svg>
  <svg class="light" viewBox="0 0 4 10"><ellipse cx="2" cy="5" rx="2" ry="5" fill="orange" opacity="0.5"/></svg>
</div>

<!-- 저승사자 -->
<div class="grim-wrapper">
  <svg class="grim" viewBox="0 0 64 64" width="60" height="60">
    <circle cx="32" cy="16" r="8" fill="white"/>
    <rect x="24" y="24" width="16" height="24" fill="white"/>
    <path d="M40 24 Q50 10 60 24" stroke="white" stroke-width="2" fill="none"/>
  </svg>
</div>

<div class="container">
<h1>주마등 : 시네마 v10</h1>
<p class="subtitle">6초 인생 자동 타임라인 생성기 (무료 Groq 지원)</p>

<!-- AI 모델 선택 + API Key -->
<label>AI 모델 선택:
  <select id="aiModel">
    <option value="groq" selected>Groq (무료)</option> <!-- 기본값 Groq -->
    <option value="openai">OpenAI GPT</option>
    <option value="gemini">Gemini</option>
    <option value="azure">Azure OpenAI</option>
    <option value="claude">Claude</option>
    <option value="hf">Hugging Face</option>
  </select>
</label>

<label>AI API Key:
  <input id="apiKey" placeholder="여기에 API Key 입력">
</label>

<p>무료 Groq API Key 발급: <a href="https://console.groq.com/keys" target="_blank">여기서 신청</a></p>

<label>
  <input type="checkbox" id="timelineMode">
  🧠 2시간 자동 타임라인 모드
</label>

<h3>오늘의 일기</h3>
<textarea id="diary" placeholder="오늘의 장면을 적어주세요..."></textarea>

<h3>영상 스타일</h3>
<select id="videoStyle">
  <option>흑백 시네마틱</option>
  <option>몽환적 안개</option>
  <option>느린 카메라 워킹</option>
</select>

<h3>캐릭터 스타일</h3>
<select id="characterStyle">
  <option value="Pixar 3D Animation">Pixar 3D Animation</option>
  <option value="Studio Ghibli Style">Studio Ghibli Style</option>
  <option value="Realistic Cinematic Film">Realistic Cinematic Film</option>
  <option value="Noir Black & White">Noir Black & White</option>
  <option value="Makoto Shinkai Anime">Makoto Shinkai Anime</option>
  <option value="Hyperrealistic 4K">Hyperrealistic 4K</option>
  <option value="Claymation">Claymation</option>
  <option value="Vintage 90s Film">Vintage 90s Film</option>
  <option value="custom">직접 입력</option>
</select>
<input id="customStyle" placeholder="스타일 직접 입력" style="display:none;">

<h3>캐릭터 특징</h3>
<input id="characterDesc" placeholder="예: 30대 남자, 한국인, 뿔테 안경, 근육질, 피곤함">

<button id="generateBtn">프롬프트 생성</button>

<div class="stats">
<p id="sceneCount"></p>
<p id="totalDuration"></p>
</div>

<h3>한글 프롬프트</h3>
<textarea id="outputKR" placeholder="한글 프롬프트 출력"></textarea>
<button id="copyKR">복사하기</button>

<h3>영문 프롬프트</h3>
<textarea id="outputEN" placeholder="영문 프롬프트 출력"></textarea>
<button id="copyEN">복사하기</button>

<!-- 하단 광고 -->
<div class="ad-slot" id="adBottom">출력 아래 광고 영역</div>

<div class="reaper-message">
💀 <span id="grimMessage"></span>
</div>

</div>
<script src="app.js"></script>
</body>
</html>
